<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%231A3C6E'/><path d='M16 4a10.5 10.5 0 100 22 8 8 0 110-16 10.5 10.5 0 010-6z' fill='%23C8A84B'/><polygon points='20,6 21.5,10.5 26,10.5 22.5,13.5 24,18 20,15.5 16,18 17.5,13.5 14,10.5 18.5,10.5' fill='%23C8A84B'/></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: #f5f7fb;
        }
        .page-404__code {
            font-size: 120px;

            color: #1A3C6E;
            line-height: 1;
            letter-spacing: -4px;
            opacity: .15;
            margin-bottom: -20px;
        }
        .page-404__icon {

            margin-bottom: 16px;
        }
        .page-404__title {
            font-size: 26px;
            font-weight: 700;

        }
        .page-404__btn {
            display: inline-flex;
            align-items: center;

            text-decoration: none;

            font-family: inherit;
